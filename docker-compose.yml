version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: cacaolens-postgres
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - cacaolens-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API (ExpressJS + Prisma)
  backend:
    build:
      context: ./backend/backend
      dockerfile: Dockerfile
    container_name: cacaolens-backend
    restart: unless-stopped
    env_file:
      - ./backend/backend/.env
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - ./backend/backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ml-service:
        condition: service_started
    networks:
      - cacaolens-network

  # ML Service (Flask + TensorFlow)
  ml-service:
    build:
      context: ./backend/ML-service
      dockerfile: Dockerfile
    container_name: cacaolens-ml
    restart: unless-stopped
    env_file:
      - ./backend/ML-service/.env
    ports:
      - "${ML_PORT}:8000"
    volumes:
      - ./backend/ML-service:/app
      - ml_models:/app/models
      - ml_data:/app/data
    networks:
      - cacaolens-network

volumes:
  postgres_data:
    driver: local
  backend_uploads:
    driver: local
  ml_models:
    driver: local
  ml_data:
    driver: local

networks:
  cacaolens-network:
    driver: bridge