version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: cacaolens-mysql
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
    ports:
      - "${DB_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cacaolens-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Backend API (ExpressJS + Prisma)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cacaolens-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    ports:
      - "${BACKEND_PORT}:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads:/app/uploads
    depends_on:
      mysql:
        condition: service_healthy
      ml-service:
        condition: service_started
    networks:
      - cacaolens-network

  # ML Service (FastAPI + TensorFlow)
  ml-service:
    build:
      context: ./ML
      dockerfile: Dockerfile
    container_name: cacaolens-ml
    restart: unless-stopped
    env_file:
      - ./ML/.env
    ports:
      - "${ML_PORT}:8000"
    volumes:
      - ./ML:/app
      - ml_models:/app/models
      - ml_data:/app/data
    networks:
      - cacaolens-network

volumes:
  mysql_data:
    driver: local
  backend_uploads:
    driver: local
  ml_models:
    driver: local
  ml_data:
    driver: local

networks:
  cacaolens-network:
    driver: bridge
