name: cacaolens
description: CacaoLens - Mobile app for cacao analysis
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.6.0
  dio: ^5.4.1
  
  # Image Handling
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  cached_network_image: ^3.3.1
  
  # Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Environment Variables
  flutter_dotenv: ^5.1.0
  
  # Utils
  intl: ^0.19.0
  logger: ^2.1.0
  tflite_flutter: ^0.12.1
  connectivity_plus: ^7.1.1
  image: ^4.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  
  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/models/Cacao_InceptionV3_best.tflite

  # fonts:
